name: Tests

on: [push, pull_request]

jobs:
  tests:
    name: Tests PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        php: [8.5]
        experimental: [false]
        analysis: [true]

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: cours_mvc
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: xdebug
          extensions: mbstring, pdo, pdo_mysql, intl

      - name: Install dependencies with Composer
        uses: ramsey/composer-install@v2

      - name: Wait for MySQL
        run: |
          until mysqladmin ping -h 127.0.0.1 --silent; do
            echo "Waiting for database..."
            sleep 2
          done

      - name: Configure test environment
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: cours_mvc
          DB_USER: root
          DB_PASS: root
        run: |
          # Use bin/doctrine instead of bin/console
          # Since mysql:8.0 image already creates MYSQL_DATABASE, we skip database:create
          php bin/doctrine migrations:migrate --no-interaction

      - name: Coding standards
        if: matrix.analysis
        run: vendor/bin/phpcs

      - name: Static analysis
        if: matrix.analysis
        run: vendor/bin/phpstan

      - name: Tests
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: cours_mvc
          DB_USER: root
          DB_PASS: root
        run: vendor/bin/phpunit --coverage-clover clover.xml
