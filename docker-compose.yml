version: '3.8'

services:
    slim:
        build: .
        container_name: slim_app
        working_dir: /var/www
        ports:
            - "8080:8080"
        volumes:
            - .:/var/www
            - logs:/var/www/logs
        environment:
            - DB_HOST=db
            - DB_NAME=cours_mvc
            - DB_USER=root
            - DB_PASS=root
            - DB_PORT=3306
            - docker=true
            - DEBUG=true
        depends_on:
            - db

    db:
        image: mysql:8.0
        container_name: mysql_db
        restart: always
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: cours_mvc
        ports:
            - "3306:3306"
        volumes:
            - db_data:/var/lib/mysql

volumes:
    logs:
        driver: local
    db_data:
        driver: local
